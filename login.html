<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelMorphus - Welcome</title>
    
    <link rel="stylesheet" href="css/login.css">
    <link rel="icon" href="favicon.ico" type="image/x-ico">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <meta name="description" content="Your all-in-one workspace for building, creating, and sharing your best work.">
    <meta property="og:image" content="https://i.postimg.cc/vBWqRXV9/logo.png">
    <meta property="og:title" content="PixelMorphus">
    <meta property="og:description" content="Your all-in-one workspace for building, creating, and sharing your best work.">
    <script src="https://accounts.google.com/gsi/client"></script>
    <!-- =================== END: SCRIPT LOADING FIX =================== -->

</head>
<body>

    <!-- Main Landing Page Content -->
    <main class="landing-container">
        <div class="intro-section">
            <h1 class="intro-title">PixelMorphus</h1>
            <p class="intro-subtitle">Your all-in-one workspace for building, creating, and sharing your best work.</p>
            <button id="get-started-btn" class="get-started-button">Get Started</button>
        </div>
        <div class="logo-section">
            <img src="mainlogo.png" alt="PM" style="width: 150px; height: 150px;">
        </div>
    </main>

    <!-- Login Modal (Initially Hidden) -->
    <div id="login-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <span class="close-btn">×</span>
            <h2>Join Now</h2>
            <p>Sign in to begin your creative journey.</p>
            
            <div id="google-button-container">
                <!-- The script tag is now in the <head> -->
                <div id="g_id_onload"
                     data-client_id="106449844442-9796dsgtv9v82peutu71hner689le9f4.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="continue_with"
                     data-size="large"
                     data-logo_alignment="left"
                     data-width="250">
                </div>
            </div>

            <a href="#" class="skip-link-modal">Skip for now</a>
        </div>
    </div>

    <!-- Your auth script is still deferred, which is correct -->
    <script src="js/auth.js" defer></script>

</body>
</html>

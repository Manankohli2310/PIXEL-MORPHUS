<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelMorphus - Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <!-- This header will be dynamically populated by js/main.js -->
    </header>

    <main class="page-container">
        <div class="page-header">
            <h1>Choose a Tool</h1>
            <p>Select which service you would like to use.</p>

        <div class="tool-selection-grid">
            <!-- Portfolio Morph Box -->
            <a href="portfolio-morph/portfolio-morph.html" class="tool-card">
                <div class="tool-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
                </div>
                <div class="tool-info">
                    <h3>Portfolio Morph</h3>
                    <p>Create a stunning, professional developer portfolio in minutes.</p>
                </div>
            </a>
        </div>
    </main>
    
    <script src="js/main.js" defer></script>
</body>
</html>
